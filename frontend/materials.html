<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Materials - Smart Course Difficulty Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .materials-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .material-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
            position: relative;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .material-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        .material-header {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 20px;
        }

        .pdf-icon {
            font-size: 3rem;
            color: #ef4444;
            filter: drop-shadow(0 4px 6px rgba(239, 68, 68, 0.2));
        }

        .material-info h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
            line-height: 1.3;
        }

        .material-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 8px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .material-meta i {
            font-size: 0.8rem;
        }

        .rating-stars {
            display: flex;
            gap: 4px;
            color: #f59e0b;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .avg-rating {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-left: 8px;
            font-weight: 500;
        }

        .rate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }

        .rate-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                SCDA System
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
                <li class="teacher-only"><a href="add-subject.html"><i class="fas fa-plus-circle"></i> Add Subject</a>
                </li>
                <li class="student-only"><a href="rate-subject.html"><i class="fas fa-star-half-alt"></i> Rate
                        Subject</a></li>
                <li><a href="materials.html" class="active"><i class="fas fa-book-open"></i> Lecture Materials</a></li>
                <li><a href="reports.html"><i class="fas fa-chart-line"></i> Reports & Analysis</a></li>
                <li style="margin-top: auto;"><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="top-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="sidebar-toggle" class="btn" style="display: none; padding: 5px 10px;">☰</button>
                    <h2 style="margin: 0;">Lecture Materials</h2>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="user-info" style="margin-right: 15px;">Role: <span id="user-role-display">Student</span>
                    </div>
                    <button id="theme-toggle" class="theme-toggle">🌙</button>
                </div>
            </div>

            <div class="materials-container" id="materials-gallery">
                <!-- Materials will be loaded here -->
                <p class="text-muted">Loading materials...</p>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
    <script src="js/materials.js"></script>
</body>

</html>
